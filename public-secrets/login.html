<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - public secrets ensemble</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="backend-page">
    <header class="topbar">
      <button class="brand-link" type="button" onclick="window.location.href='/index.html'">public secrets ensemble</button>
    </header>
    <main class="admin-main">
      <section class="card">
        <h2>Login</h2>
        <div class="form-grid">
          <label for="identity">E-Mail oder Benutzername</label>
          <input id="identity" type="text" autocomplete="username" placeholder="name@example.com" />
          <label for="secret">Code oder Passwort</label>
          <input id="secret" type="password" autocomplete="current-password" placeholder="Einmal-Code oder Passwort" />
        </div>
        <div class="actions">
          <button id="requestBtn" class="secondary" type="button">Zugangslink senden</button>
          <button id="loginBtn" class="primary" type="button">Einloggen</button>
        </div>
        <p id="loginMsg" class="muted"></p>
      </section>
    </main>
    <script src="login.js?v=20260306a"></script>
      <script src="/theme-toggle.js"></script>
  </body>
</html>
