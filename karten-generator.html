<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weiterleitung zum Karten-Generator</title>
  <meta http-equiv="refresh" content="0; url=./apps/karten-generator/" />
  <script>
    (function () {
      var target = "./apps/karten-generator/";
      if (location.pathname.endsWith("/apps/karten-generator/")) return;
      location.replace(target + location.search + location.hash);
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #36424f;
      color: #dbe0e4;
      font: 400 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: #ebb565; }
  </style>
</head>
<body>
  <p>Weiterleitung zum Karten-Generator… <a href="./apps/karten-generator/">Falls noetig hier klicken</a>.</p>
</body>
</html>
