services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portrait_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      HF_HOME: /app/.hf-cache
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.worker.main
    env_file:
      - .env
    environment:
      HF_HOME: /app/.hf-cache
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

volumes:
  pg_data:
