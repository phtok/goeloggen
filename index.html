<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
<title>Goetheanum Werkzeuge – Hausgrafik</title>
<meta name="description" content="Werkzeuge für die Hausgrafik des Goetheanum: Logos, Schriften, E-Mail-Signatur, Visitenkarten und das Design-System." />
<link rel="icon" type="image/svg+xml" href="assets/logos/goetheanum-mark-blue.svg" />
<link rel="stylesheet" href="design-system/tokens.css" />
<link rel="stylesheet" href="design-system/base.css" />
<link rel="stylesheet" href="design-system/nav.css" />
<style>
  /* Icon-Webfont nur fürs Karten-Mini-Visual (das Erzeugnis als Erkennungszeichen). */
  @font-face{font-family:"G Icons";src:url("assets/fonts/goetheanum/Webfonts/woff2/Goetheanum-Icons-v2.7.woff2") format("woff2");font-display:block}

  /* Startseite: nur die Karten – kein Hero, keine Überschriften, keine Erklärungen.
     Atem unter dem Header, aber knapp (‹über dem Karussell zu viel Luft› –
     Entscheid Auftraggeber, 8. Juli 2026). main.wrap, sonst gewinnt .wrap (0 26px)
     und der Abstand oben bliebe wirkungslos – nur top/bottom setzen. */
  main.wrap{padding-top:clamp(36px,5vw,60px);padding-bottom:clamp(40px,6vw,64px)}
  .grid{display:grid;gap:var(--s4);grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}

  .tile{position:relative;display:flex;flex-direction:column;gap:var(--s3);border:1px solid var(--line);
    border-radius:var(--r-card);padding:var(--s6);background:var(--paper);text-decoration:none;color:var(--ink);
    transition:border-color .15s,box-shadow .15s,transform .15s}
  .tile:hover{border-color:var(--gold-ink);box-shadow:var(--shadow-card);transform:translateY(-1px)}
  .tile h2{font-family:var(--font-display);font-weight:var(--w-deutlich);font-size:20px;line-height:1.15;display:flex;align-items:center;gap:9px;margin:0}
  .tile h2 .arr{color:var(--muted);font-weight:var(--w-text);transition:transform .15s,color .15s}
  .tile:hover h2 .arr{color:var(--gold-ink);transform:translateX(3px)}

  /* Greifbare Mini-Werkzeuge je Karte – das Erzeugnis als Erkennungszeichen. */
  .thumb{height:96px;display:grid;place-items:center;border-radius:10px;background:var(--paper);
    border:1px solid var(--line-soft);overflow:hidden}
  .thumb img{height:46px;width:auto;display:block}
  /* Buchstaben-Probe (Schriften) */
  .thumb .spec{font-family:var(--font-display);font-weight:var(--w-deutlich);font-size:46px;line-height:1;color:var(--ink);letter-spacing:.02em}
  /* Visitenkarte */
  .thumb .vk{width:58px;height:37px;border:1.6px solid var(--muted);border-radius:4px;display:grid;align-content:center;gap:5px;padding:8px}
  .thumb .vk i{display:block;height:2px;background:var(--muted);border-radius:2px}
  .thumb .vk i:nth-child(1){width:64%}.thumb .vk i:nth-child(2){width:42%}
  /* Signatur-Block: blaue Kante + Zeilen (wie die echte Trennlinie) */
  .thumb .sig{display:flex;gap:10px;align-items:center}
  .thumb .sig>b{width:3px;height:40px;background:var(--blue);border-radius:2px;display:block}
  .thumb .sig>span{display:grid;gap:6px}
  .thumb .sig i{display:block;height:2.5px;background:var(--muted);border-radius:2px}
  .thumb .sig i:nth-child(1){width:56px}.thumb .sig i:nth-child(2){width:40px}.thumb .sig i:nth-child(3){width:48px}
  /* Webfont: Schrift im Browser-Fenster */
  .thumb .win{width:78px;height:58px;border:1.6px solid var(--muted);border-radius:6px;position:relative;display:grid;place-items:center;overflow:hidden}
  .thumb .win>b{position:absolute;top:0;left:0;right:0;height:14px;background:var(--line-soft);border-bottom:1.4px solid var(--muted)}
  .thumb .win>em{font-family:var(--font-display);font-weight:var(--w-deutlich);font-style:normal;font-size:26px;color:var(--ink);margin-top:11px}
  /* Typografie: gesetzter Absatz, erste Zeile als goldene Überschrift */
  .thumb .para{display:grid;gap:6px;width:66px}
  .thumb .para i{display:block;height:3px;border-radius:2px;background:var(--muted)}
  .thumb .para i:nth-child(1){background:var(--gold-ink);width:72%;height:4.5px}
  .thumb .para i:nth-child(2){width:100%}.thumb .para i:nth-child(3){width:100%}.thumb .para i:nth-child(4){width:60%}
  /* Design-System: Farbfelder */
  .thumb .sw{display:flex;gap:9px}
  .thumb .sw i{width:20px;height:20px;border-radius:5px;display:block}
  /* Design-System: Mini-Bauplan – Struktur (Leiste, Zeilen) + Farbe (Chips) */
  .thumb .sys{display:grid;gap:6px;width:122px}
  .thumb .sys .bar{height:13px;border-radius:4px;background:var(--blue)}
  .thumb .sys .ln{height:7px;border-radius:3px;background:var(--line)}
  .thumb .sys .ln.s{width:60%}
  .thumb .sys .chips{display:flex;gap:6px;margin-top:3px}
  .thumb .sys .chips i{width:18px;height:18px;border-radius:5px;display:block}
  /* Icons: drei Piktogramme aus dem Icon-Webfont (currentColor – folgt Hell/Dunkel) */
  .thumb .icons{font-family:"G Icons";font-size:36px;line-height:1;color:var(--ink);display:flex;gap:14px}
  /* PowerPoint: eine Folie mit Titelzeile (statt mehrdeutigem „P") */
  .thumb .ppt{width:76px;height:56px;border:1.6px solid var(--muted);border-radius:5px;display:grid;align-content:start;gap:6px;padding:9px}
  .thumb .ppt b{display:block;height:7px;width:62%;background:var(--gold-ink);border-radius:2px}
  .thumb .ppt i{display:block;height:3px;background:var(--muted);border-radius:2px}
  .thumb .ppt i:nth-child(2){width:100%}.thumb .ppt i:nth-child(3){width:76%}
  /* Übersetzungen: vier Sprach-Marken */
  .thumb .tr{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .thumb .tr i{font-family:var(--font-display);font-weight:var(--w-deutlich);font-size:15px;font-style:normal;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:3px 9px}
  /* Editor: Text mit einer offenen Frage (Gold-Markierung), wie in der Marginalspalte */
  .thumb .ed{display:grid;gap:6px;width:66px}
  .thumb .ed i{display:block;height:3px;border-radius:2px;background:var(--muted)}
  .thumb .ed i:nth-child(1){width:100%}
  .thumb .ed i.mk{background:var(--gold-ink);width:44%}
  .thumb .ed i:nth-child(3){width:82%}
  /* Campus-Karte: Mini-Karte – Campusblau, weisse Wege, Bau, zwei Marken.
     Physische Kartenfarben (gedrucktes Artefakt), keine Theme-Flächen. */
  .thumb .map{position:relative;width:82px;height:58px;border-radius:7px;overflow:hidden;display:block;background:#8abfe5} /* # ds-ok: Kartenfarbe Campus (Artefakt) */
  .thumb .map b{position:absolute;background:#fff;border-radius:3px} /* # ds-ok: Wege weiss (Artefakt) */
  .thumb .map b:nth-child(1){width:120%;height:7px;left:-10%;top:33px;transform:rotate(-13deg)}
  .thumb .map b:nth-child(2){width:7px;height:80%;left:50px;top:-4px;transform:rotate(21deg)}
  .thumb .map .bau{position:absolute;width:24px;height:17px;left:13px;top:9px;border-radius:3px;transform:rotate(-7deg);background:#0067b2} /* # ds-ok: Goetheanum-Blau (Artefakt) */
  .thumb .map .m1,.thumb .map .m2{position:absolute;width:12px;height:12px;border-radius:50%;border:1.6px solid #fff} /* # ds-ok: Markenrand weiss (Artefakt) */
  .thumb .map .m1{background:var(--gold-deep);left:52px;top:10px}
  .thumb .map .m2{background:#ec5f6c;left:22px;top:36px} /* # ds-ok: Markerrot der Karte (Artefakt) */

  /* QR-Code – das DING, das das Werkzeug macht: drei gerundete Augen + Module,
     einfarbig über Tokens (theme-fähig, kein Artefakt-Grund nötig). */
  .thumb .qrg{width:54px;height:54px;display:block}
  .thumb .qrg .ink{fill:var(--ink)} .thumb .qrg .pap{fill:var(--paper)}

  /* Entdecker-Karussell – Hinweis auf weniger Bekanntes, oben über den Karten. */
  .carousel{position:relative;margin-bottom:var(--s8);border:1px solid var(--line);
    border-radius:var(--r-card);background:var(--soft);overflow:hidden}
  .carousel .track{display:flex;transition:transform .45s ease}
  @media(prefers-reduced-motion:reduce){.carousel .track{transition:none}.tile:hover{transform:none}}
  .carousel .slide{flex:0 0 100%;min-width:0;box-sizing:border-box;display:flex;
    align-items:center;justify-content:center;gap:var(--s6);
    padding:var(--s6) clamp(var(--s6),5vw,var(--s8));text-decoration:none;color:var(--ink)}
  .carousel .slide .thumb{width:132px;height:104px;flex:0 0 auto}
  .carousel .slide .copy{min-width:0;max-width:520px}
  .carousel .slide .kick{color:var(--gold-ink);font-size:var(--t-small);letter-spacing:.04em}
  .carousel .slide h2{font-family:var(--font-display);font-weight:var(--w-deutlich);
    font-size:clamp(21px,3vw,29px);line-height:1.1;margin:2px 0 0}
  .carousel .slide p{color:var(--muted);max-width:54ch;margin:6px 0 0;line-height:1.5}
  .carousel .slide .go{display:inline-block;margin-top:10px;color:var(--gold-ink);font-weight:var(--w-deutlich)}
  .carousel .arrow{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;
    border-radius:var(--r-pill);border:1px solid var(--line);background:var(--paper);color:var(--ink);
    cursor:pointer;display:grid;place-items:center;font-size:20px;line-height:1;padding:0;z-index:2}
  .carousel .arrow:hover{border-color:var(--gold-ink);color:var(--gold-ink)}
  .carousel .arrow.l{left:12px}.carousel .arrow.r{right:12px}
  /* Anhalten/Weiter unten links – eigener, zustandsfester Schalter (WCAG 2.2.2). */
  .carousel .arrow.pause{left:12px;right:auto;top:auto;bottom:11px;transform:none;width:30px;height:30px;font-size:var(--t-micro)}
  .carousel .dots{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:2}
  .carousel .dots button{position:relative;width:8px;height:8px;border-radius:var(--r-pill);border:0;background:var(--line);
    cursor:pointer;padding:0;transition:width .2s,background .2s}
  /* sichtbarer Punkt bleibt 8 px, Trefferfläche ≥ 24 px (WCAG 2.5.8). */
  .carousel .dots button::before{content:"";position:absolute;inset:-9px}
  .carousel .dots button.on{background:var(--gold-deep);width:22px}
  @media(max-width:560px){
    .carousel .slide{flex-direction:column;align-items:flex-start;gap:var(--s4);padding:var(--s6)}
    .carousel .slide .thumb{width:100%;height:120px}
    .carousel .slide .copy{max-width:none}
    .carousel .arrow{display:none}
  }
</style>
</head>
<body>

<script src="design-system/nav.js" data-root="./" data-active="start"></script>

<main class="wrap" id="inhalt">
  <h1 class="sr-only">Goetheanum Werkzeuge – Hausgrafik</h1>
  <section class="carousel" id="carousel" aria-roledescription="Karussell" aria-label="Entdecken" hidden></section>
  <div class="grid" id="cards"></div>
</main>

<footer class="ds-footer">
  <div class="wrap frow">
    <span><strong>Goetheanum</strong> · Werkzeuge für die Hausgrafik</span>
    <span>Allgemeine Anthroposophische Gesellschaft · <a href="https://www.goetheanum.ch">goetheanum.ch</a></span>
  </div>
</footer>

<script>
"use strict";
(function(){
  // Karten flach nach Priorität (keine Kategorien); Unbekannte ans Ende.
  // Webfont wohnt jetzt in Schriften, Zeichen in Logos – darum keine eigene Karte.
  // Neue Ordnung (Entscheid Auftraggeber, 8. Juli 2026).
  var ORDER = ["logo-generator","signatur","visitenkarten","qr-generator","schriften",
    "icons","uebersetzungen","typografie","powerpoint",
    "wallpaper","karten","sektionsfarben","design-system",
    "editor"];
  // Entdecker-Karussell: ausgewählte Werkzeuge, je ein Teaser.
  // Alle öffentlichen Karten – geordnet von der breitesten Zielgruppe zur kleinsten:
  // erst die täglichen Werkzeuge für alle (Signatur, Wallpaper, Präsentation, Karte),
  // dann Hausbild und Nachschlagewerke, zuletzt die Gestaltungs- und Bau-Ebene.
  // Design-System steht bewusst am Ende (kleinste, spezialisierte Gruppe).
  var DISCOVER = [
    {slug:"signatur",       line:"Die Mail-Signatur im Hausbild – Angaben eintragen, Block kopieren, einsetzen."},
    {slug:"empfehlungen",   line:"Elf Empfehlungen für E-Mails, die gelesen werden – mit PS-Zeile, Kalender-Erinnerung und A4-PDF."},
    {slug:"karten",         line:"Die Campus-Karte für Veranstaltungen – Orte wählen, eigene Marken setzen, druckfertiges Vektor-PDF in A4 oder A3."},
    {slug:"wallpaper",      line:"Elf Goetheanum-Hintergründe für den Desktop, frei zum Herunterladen."},
    {slug:"powerpoint",     line:"Präsentationsvorlage im Hausbild – mit eingebetteten Schriften, sofort loslegen."},
    {slug:"visitenkarten",  line:"Die eigene Visitenkarte im Hausbild – ausfüllen, Vorschau, Druckdatei."},
    {slug:"logo-generator", line:"Das Logo für jede Sektion und jeden Bereich setzen und sauber exportieren."},
    {slug:"schriften",      line:"Die Hausschrift v2.7: fünf Schnitte von Leise bis Laut, Variable Font und Icon-Satz."},
    {slug:"uebersetzungen", line:"Sektionen und Begriffe in vier Sprachen – für Karten, Briefe und die Sekretariate."},
    {slug:"icons",          line:"45 Piktogramme, Pfeile und Kompass – als Webfont per Taste oder einzeln als SVG, PNG, PDF."},
    {slug:"sektionsfarben", line:"Die Farben der Schul-Sektionen – Werte, Anwendung und wo Weiss darauf steht."},
    {slug:"typografie",     line:"Die Satzregeln des Hauses – Auszeichnung, Ziffern, Striche, Anführungen; nachschlagen und prüfen."},
    {slug:"editor",         line:"Text im Hausbild setzen – die Regeln greifen beim Tippen, fertig zum Übernehmen."},
    {slug:"design-system",  line:"Farben, Schnitte und Regeln aus einer Quelle – für Gestaltende, die neue Werkzeuge bauen."}
  ];
  // Greifbar: jedes Zeichen zeigt das DING, das das Werkzeug erzeugt.
  var VISUAL = {
    "logo-generator":  '<img src="assets/logos/goetheanum-marke.svg" alt="">',               // die blanke Marke (aus der Engine, DS08)
    "visitenkarten":   '<span class="vk"><i></i><i></i></span>',                               // eine Karte
    "signatur":        '<span class="sig"><b></b><span><i></i><i></i><i></i></span></span>',   // Signatur-Block (blaue Kante + Zeilen)
    "schriften":       '<span class="spec">Ag</span>',                                         // Buchstaben-Probe
    "icons":           '<span class="icons" aria-hidden="true">gfx</span>',                     // drei Piktogramme (WLAN · Garderobe · Rollstuhl)
    "schrift-webfont": '<span class="win"><b></b><em>Aa</em></span>',                          // Schrift im Browser-Fenster
    "typografie":      '<span class="para"><i></i><i></i><i></i><i></i></span>',               // gesetzter Absatz
    "design-system":   '<span class="sys"><i class="bar"></i><i class="ln"></i><i class="ln s"></i><span class="chips"><i style="background:var(--gold)"></i><i style="background:var(--sek-ms)"></i><i style="background:var(--gold-deep)"></i></span></span>', // Mini-Bauplan: Struktur + Farbe
    "sektionsfarben":  '<span class="sw"><i style="background:var(--sek-szw)"></i><i style="background:var(--sek-lws)"></i><i style="background:var(--sek-ms)"></i><i style="background:var(--sek-js)"></i></span>', // vier Sektionsfarben
    "zeichen":         '<span style="background:#fff;border-radius:8px;width:100%;height:100%;display:grid;place-items:center"><img src="assets/zeichen/hochschulzeichen.png" alt="" style="max-height:66px;max-width:78%"></span>', // Rudolf-Steiner-Zeichen auf weissem Papier
    "wallpaper":       '<img src="assets/wallpaper/goetheanum-wallpaper-48.jpg" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:8px">', // ein Motiv
    "powerpoint":      '<span class="ppt"><b></b><i></i><i></i></span>', // eine Folie mit Titel
    "uebersetzungen":  '<span class="tr"><i>DE</i><i>EN</i><i>FR</i><i>ES</i></span>', // vier Sprachen
    "editor":          '<span class="ed"><i></i><i class="mk"></i><i></i></span>', // Text mit offener Frage
    "karten":          '<span class="map"><b></b><b></b><span class="bau"></span><i class="m1"></i><i class="m2"></i></span>', // Mini-Campus mit Marken
    "qr-generator":    '<svg class="qrg" viewBox="0 0 25 25" aria-hidden="true">' +
      '<rect class="ink" x="0" y="0" width="7" height="7" rx="2"/><rect class="pap" x="1" y="1" width="5" height="5" rx="1.4"/><rect class="ink" x="2" y="2" width="3" height="3" rx="0.8"/>' +
      '<rect class="ink" x="18" y="0" width="7" height="7" rx="2"/><rect class="pap" x="19" y="1" width="5" height="5" rx="1.4"/><rect class="ink" x="20" y="2" width="3" height="3" rx="0.8"/>' +
      '<rect class="ink" x="0" y="18" width="7" height="7" rx="2"/><rect class="pap" x="1" y="19" width="5" height="5" rx="1.4"/><rect class="ink" x="2" y="20" width="3" height="3" rx="0.8"/>' +
      '<g class="ink">' +
      '<rect x="8.6" y="0.5" width="1.5" height="1.5" rx="0.5"/><rect x="11.4" y="0.5" width="1.5" height="1.5" rx="0.5"/><rect x="14.2" y="0.5" width="1.5" height="1.5" rx="0.5"/><rect x="8.6" y="3.3" width="1.5" height="1.5" rx="0.5"/><rect x="14.2" y="2.9" width="1.5" height="1.5" rx="0.5"/>' +
      '<rect x="0.5" y="8.6" width="1.5" height="1.5" rx="0.5"/><rect x="3.3" y="8.6" width="1.5" height="1.5" rx="0.5"/><rect x="2.9" y="11.4" width="1.5" height="1.5" rx="0.5"/><rect x="0.5" y="14.2" width="1.5" height="1.5" rx="0.5"/>' +
      '<rect x="8.6" y="8.6" width="1.5" height="1.5" rx="0.5"/><rect x="11.4" y="8.6" width="1.5" height="1.5" rx="0.5"/><rect x="14.2" y="11" width="1.5" height="1.5" rx="0.5"/><rect x="8.6" y="11.4" width="1.5" height="1.5" rx="0.5"/><rect x="11.4" y="14.2" width="1.5" height="1.5" rx="0.5"/><rect x="16" y="8.6" width="1.5" height="1.5" rx="0.5"/><rect x="15.5" y="15.4" width="1.5" height="1.5" rx="0.5"/><rect x="11.4" y="16.6" width="1.5" height="1.5" rx="0.5"/>' +
      '<rect x="18.4" y="10.4" width="1.5" height="1.5" rx="0.5"/><rect x="21.2" y="8.6" width="1.5" height="1.5" rx="0.5"/><rect x="23" y="12.6" width="1.5" height="1.5" rx="0.5"/><rect x="18.4" y="13.8" width="1.5" height="1.5" rx="0.5"/><rect x="21.5" y="16" width="1.5" height="1.5" rx="0.5"/>' +
      '<rect x="8.6" y="18.4" width="1.5" height="1.5" rx="0.5"/><rect x="11.4" y="21" width="1.5" height="1.5" rx="0.5"/><rect x="14.2" y="18.4" width="1.5" height="1.5" rx="0.5"/><rect x="18.4" y="18.4" width="1.5" height="1.5" rx="0.5"/><rect x="21.4" y="21" width="1.5" height="1.5" rx="0.5"/><rect x="15.5" y="22" width="1.5" height="1.5" rx="0.5"/><rect x="18.4" y="23" width="1.5" height="1.5" rx="0.5"/>' +
      '</g></svg>', // ein QR-Code mit den Haus-Augen
    "empfehlungen":    '<span class="spec" style="color:var(--gold-ink)">11</span>' // die elf Gebote
  };
  function visual(t){
    var v = VISUAL[t.slug] || ('<span class="spec">' + (t.title || "?").slice(0, 1) + '</span>');
    return '<span class="thumb">' + v + '</span>';
  }
  function isExt(h){ return /^https?:/.test(h); }
  function tile(t){
    var a = document.createElement("a");
    a.className = "tile";
    a.href = t.href;
    if (isExt(t.href)) { a.target = "_blank"; a.rel = "noopener"; }
    a.innerHTML = visual(t) + '<h2>' + t.title + ' <span class="arr">›</span></h2>';
    return a;
  }
  function buildCarousel(byslug){
    // Karussell-Extra (kein eigenes Werkzeug): die elf E-Mail-Gebote.
    byslug["empfehlungen"] = byslug["empfehlungen"] || {
      slug: "empfehlungen", title: "Diese Mail wird gelesen",
      href: "apps/signatur-generator/#empfehlungen"
    };
    var car = document.getElementById("carousel");
    var items = DISCOVER.map(function(d){ return { d:d, t:byslug[d.slug] }; })
                        .filter(function(x){ return x.t; });
    if (items.length < 2) { car.remove(); return; }   // Karussell erst ab zwei Folien

    var track = document.createElement("div"); track.className = "track";
    items.forEach(function(x){
      var a = document.createElement("a"); a.className = "slide"; a.href = x.t.href;
      if (isExt(x.t.href)) { a.target = "_blank"; a.rel = "noopener"; }
      a.innerHTML = visual(x.t) +
        '<span class="copy"><h2>' + x.t.title + '</h2><p>' + x.d.line + '</p>' +
        '<span class="go">Ansehen ›</span></span>';
      track.appendChild(a);
    });
    var prev = document.createElement("button"); prev.className = "arrow l"; prev.type = "button"; prev.setAttribute("aria-label","Zurück"); prev.textContent = "‹";
    var next = document.createElement("button"); next.className = "arrow r"; next.type = "button"; next.setAttribute("aria-label","Weiter"); next.textContent = "›";
    var dots = document.createElement("div"); dots.className = "dots";
    car.appendChild(track); car.appendChild(prev); car.appendChild(next); car.appendChild(dots);
    car.hidden = false;

    var i = 0, n = items.length, timer = null;
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;
    var paused = reduce;   // bei prefers-reduced-motion von Anfang an gestoppt
    for (var k = 0; k < n; k++) {
      (function(k){
        var b = document.createElement("button"); b.type = "button"; b.setAttribute("aria-label","Folie " + (k+1));
        b.addEventListener("click", function(){ go(k); start(); });
        dots.appendChild(b);
      })(k);
    }
    function paint(){
      track.style.transform = "translateX(-" + (i*100) + "%)";
      var ds = dots.children;
      for (var k = 0; k < ds.length; k++) {
        ds[k].className = (k === i ? "on" : "");
        if (k === i) ds[k].setAttribute("aria-current","true"); else ds[k].removeAttribute("aria-current");
      }
    }
    function go(k){ i = (k + n) % n; paint(); }
    function start(){ if (reduce || paused) return; stop(); timer = setInterval(function(){ go(i+1); }, 11000); }
    function stop(){ if (timer) { clearInterval(timer); timer = null; } }
    prev.addEventListener("click", function(){ go(i-1); start(); });
    next.addEventListener("click", function(){ go(i+1); start(); });
    // Sichtbarer, zustandsfester Halt/Weiter-Schalter (WCAG 2.2.2). Hält dauerhaft:
    // solange paused, startet der Timer nicht wieder (auch nicht bei mouseleave/focusout).
    var pauseBtn = document.createElement("button"); pauseBtn.type = "button"; pauseBtn.className = "arrow pause";
    function syncPause(){
      pauseBtn.setAttribute("aria-pressed", String(paused));
      pauseBtn.setAttribute("aria-label", paused ? "Automatischen Wechsel starten" : "Automatischen Wechsel anhalten");
      pauseBtn.textContent = paused ? "▶" : "❚❚";
    }
    pauseBtn.addEventListener("click", function(){ paused = !paused; syncPause(); if (paused) stop(); else start(); });
    syncPause(); car.appendChild(pauseBtn);
    car.addEventListener("mouseenter", stop); car.addEventListener("mouseleave", start);
    car.addEventListener("focusin", stop); car.addEventListener("focusout", start);
    var x0 = null;
    car.addEventListener("touchstart", function(e){ x0 = e.touches[0].clientX; stop(); }, {passive:true});
    car.addEventListener("touchend", function(e){
      if (x0 === null) return;
      var dx = e.changedTouches[0].clientX - x0;
      if (Math.abs(dx) > 40) go(i + (dx < 0 ? 1 : -1));
      x0 = null; start();
    }, {passive:true});
    paint(); start();
  }

  function render(man){
    // Öffentliche Welten (Backstage wie schau/schriftpflege/statistik bleibt draussen).
    var PUBLIC = ["generatoren", "schrift", "system", "anwendung"];
    var tools = (man.tools || []).filter(function(t){
      return PUBLIC.indexOf(t.cat) >= 0 && (t.status === "live" || t.status === "beta");
    });
    var byslug = {}; tools.forEach(function(t){ byslug[t.slug] = t; });
    buildCarousel(byslug);
    var rank = function(t){ var k = ORDER.indexOf(t.slug); return k < 0 ? 999 : k; };
    tools.sort(function(a,b){ return rank(a) - rank(b); });
    var grid = document.getElementById("cards");
    tools.forEach(function(t){ grid.appendChild(tile(t)); });
  }
  fetch("tools.json").then(function(r){ return r.json(); }).then(render).catch(function(){
    document.getElementById("cards").innerHTML = '<p class="meta">Werkzeugliste konnte nicht geladen werden.</p>';
  });
})();
</script>
</body>
</html>
