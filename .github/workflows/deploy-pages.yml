name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "schriften.html"
      - "statistik.html"
      - "werkzeug.html"
      - "proof.html"
      - "zuordnen.html"
      - "kerning.html"
      - "ineinander.html"
      - "ligvorschau.html"
      - "schrift-webfont.html"
      - "tester.html"
      - "typografie.html"
      - "vorschau.html"
      - "schrift-vergleich.html"
      - "logo-generator.html"
      - "visitenkarten.html"
      - "visitenkarten-generator.html"
      - "signatur-generator.html"
      - "karten.html"
      - "karten-generator.html"
      - "cover-generator.html"
      - "index-cover-generator.html"
      - "briefschaften.html"
      - "index-goelogger-gci1.html"
      - "apps/logo-generator/**"
      - "apps/gtv-naming/**"
      - "apps/visitenkarten-generator/**"
      - "apps/signatur-generator/**"
      - "apps/karten-generator/**"
      - "apps/cover-generator/**"
      - "apps/briefschaften/**"
      - "assets/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build publish bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          test -f index.html
          cp index.html _site/index.html
          if [ -f schriften.html ]; then cp schriften.html _site/schriften.html; fi
          if [ -f statistik.html ]; then cp statistik.html _site/statistik.html; fi
          if [ -f werkzeug.html ]; then cp werkzeug.html _site/werkzeug.html; fi
          if [ -f proof.html ]; then cp proof.html _site/proof.html; fi
          if [ -f zuordnen.html ]; then cp zuordnen.html _site/zuordnen.html; fi
          if [ -f kerning.html ]; then cp kerning.html _site/kerning.html; fi
          if [ -f ineinander.html ]; then cp ineinander.html _site/ineinander.html; fi
          if [ -f ligvorschau.html ]; then cp ligvorschau.html _site/ligvorschau.html; fi
          if [ -f schrift-webfont.html ]; then cp schrift-webfont.html _site/schrift-webfont.html; fi
          if [ -f tester.html ]; then cp tester.html _site/tester.html; fi
          if [ -f typografie.html ]; then cp typografie.html _site/typografie.html; fi
          if [ -f vorschau.html ]; then cp vorschau.html _site/vorschau.html; fi
          if [ -f schrift-vergleich.html ]; then cp schrift-vergleich.html _site/schrift-vergleich.html; fi
          test -f logo-generator.html
          cp logo-generator.html _site/logo-generator.html
          if [ -f index-goelogger-gci1.html ]; then cp index-goelogger-gci1.html _site/index-goelogger-gci1.html; fi
          if [ -f visitenkarten.html ]; then cp visitenkarten.html _site/visitenkarten.html; fi
          if [ -f visitenkarten-generator.html ]; then cp visitenkarten-generator.html _site/visitenkarten-generator.html; fi
          if [ -f signatur-generator.html ]; then cp signatur-generator.html _site/signatur-generator.html; fi
          if [ -f karten.html ]; then cp karten.html _site/karten.html; fi
          if [ -f karten-generator.html ]; then cp karten-generator.html _site/karten-generator.html; fi
          if [ -f cover-generator.html ]; then cp cover-generator.html _site/cover-generator.html; fi
          if [ -f index-cover-generator.html ]; then cp index-cover-generator.html _site/index-cover-generator.html; fi
          if [ -f briefschaften.html ]; then cp briefschaften.html _site/briefschaften.html; fi
          mkdir -p _site/apps
          if [ -d apps/logo-generator ]; then cp -R apps/logo-generator _site/apps/; fi
          if [ -d apps/gtv-naming ]; then cp -R apps/gtv-naming _site/apps/; fi
          if [ -d apps/visitenkarten-generator ]; then cp -R apps/visitenkarten-generator _site/apps/; fi
          if [ -d apps/signatur-generator ]; then cp -R apps/signatur-generator _site/apps/; fi
          if [ -d apps/karten-generator ]; then cp -R apps/karten-generator _site/apps/; fi
          if [ -d apps/cover-generator ]; then cp -R apps/cover-generator _site/apps/; fi
          if [ -d apps/briefschaften ]; then cp -R apps/briefschaften _site/apps/; fi
          if [ -d assets ]; then
            mkdir -p _site/assets
            cp -R assets/. _site/assets/
          fi
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
