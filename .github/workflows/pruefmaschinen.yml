# Prüfmaschinen als CI-Gate (Beschluss vom 10. Juli 2026):
# «Automatisch mergen, wenn die Prüfmaschinen grün sind» ist erst durchsetzbar,
# wenn die Maschinen unabhängig vom lokalen Hook auf jedem PR laufen.
# Sprache (typo-check) und Gestalt (ds-lint) blockieren bei Schwere ‹fehler›;
# Hinweise melden, blockieren nicht — wie im Hook.
name: Prüfmaschinen

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pruefen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: typo-check (Sprache, alle Seiten)
        run: python3 tools/typo-check.py --all
      - name: ds-lint (Gestalt, alle Seiten + Score)
        run: python3 tools/ds-lint.py
